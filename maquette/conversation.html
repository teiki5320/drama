<title>Drama — Maquette de l'écran de conversation</title>
<style>
  :root{
    --page:#ECECF1; --page-text:#606069;
    --phone-bg:#FFFFFF; --phone-edge:#C9C9D2;
    --in-bubble:#E9E9EB; --in-text:#101014;
    --out-bubble:#0A7CFF; --out-text:#FFFFFF;
    --meta:#8A8A92; --head-bg:rgba(249,249,250,.94); --head-border:#E3E3E8;
    --head-text:#101014; --chev:#0A7CFF;
    --choice-text:#0A7CFF; --choice-border:rgba(10,124,255,.55); --choice-bg:rgba(10,124,255,.06);
    --brand:#D91E4A;
    --avatar-a:#9BA0AB; --avatar-b:#7A8090;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --page:#0E0E13; --page-text:#9A9AA6;
      --phone-bg:#000000; --phone-edge:#2E2E36;
      --in-bubble:#26262B; --in-text:#F2F2F5;
      --out-bubble:#0A84FF;
      --meta:#7C7C85; --head-bg:rgba(18,18,20,.94); --head-border:#232329;
      --head-text:#F2F2F5;
      --choice-text:#409CFF; --choice-border:rgba(64,156,255,.55); --choice-bg:rgba(64,156,255,.12);
    }
  }
  :root[data-theme="light"]{
    --page:#ECECF1; --page-text:#606069;
    --phone-bg:#FFFFFF; --phone-edge:#C9C9D2;
    --in-bubble:#E9E9EB; --in-text:#101014;
    --out-bubble:#0A7CFF; --out-text:#FFFFFF;
    --meta:#8A8A92; --head-bg:rgba(249,249,250,.94); --head-border:#E3E3E8;
    --head-text:#101014; --chev:#0A7CFF;
    --choice-text:#0A7CFF; --choice-border:rgba(10,124,255,.55); --choice-bg:rgba(10,124,255,.06);
  }
  :root[data-theme="dark"]{
    --page:#0E0E13; --page-text:#9A9AA6;
    --phone-bg:#000000; --phone-edge:#2E2E36;
    --in-bubble:#26262B; --in-text:#F2F2F5;
    --out-bubble:#0A84FF; --out-text:#FFFFFF;
    --meta:#7C7C85; --head-bg:rgba(18,18,20,.94); --head-border:#232329;
    --head-text:#F2F2F5; --chev:#409CFF;
    --choice-text:#409CFF; --choice-border:rgba(64,156,255,.55); --choice-bg:rgba(64,156,255,.12);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--page);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:18px 12px; min-height:100dvh;
  }

  .caption{
    color:var(--page-text); font-size:12.5px; letter-spacing:.02em; text-align:center;
    max-width:390px; line-height:1.5;
  }
  .caption .brand{
    color:var(--brand); font-weight:800; letter-spacing:.22em; font-size:12px;
  }

  .phone{
    width:min(390px, 100%);
    height:min(800px, calc(100dvh - 84px));
    min-height:560px;
    background:var(--phone-bg);
    border:1px solid var(--phone-edge);
    border-radius:44px;
    box-shadow:0 24px 60px rgba(0,0,0,.28);
    display:flex; flex-direction:column;
    overflow:hidden; position:relative;
  }

  /* ---- status bar ---- */
  .statusbar{
    flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
    padding:14px 26px 4px; color:var(--head-text);
    font-size:14px; font-weight:600; font-variant-numeric:tabular-nums;
    background:var(--head-bg);
  }
  .statusbar .glyphs{display:flex; align-items:center; gap:6px;}
  .sig{display:flex; align-items:flex-end; gap:1.5px; height:11px;}
  .sig i{width:3px; background:var(--head-text); border-radius:1px; display:block;}
  .sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}
  .sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:11px}
  .batt{width:24px; height:11.5px; border:1px solid var(--head-text); border-radius:3.5px; padding:1.5px; position:relative;}
  .batt::after{content:""; position:absolute; right:-3.5px; top:3px; width:2px; height:5px; background:var(--head-text); border-radius:0 2px 2px 0; opacity:.5;}
  .batt i{display:block; height:100%; width:72%; background:var(--head-text); border-radius:1.5px;}

  /* ---- conversation header ---- */
  .head{
    flex:0 0 auto; display:grid; grid-template-columns:44px 1fr 44px; align-items:center;
    padding:2px 10px 8px; background:var(--head-bg);
    border-bottom:.5px solid var(--head-border);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    z-index:2;
  }
  .chev{color:var(--chev); font-size:28px; line-height:1; padding:0 6px; user-select:none;}
  .who{display:flex; flex-direction:column; align-items:center; gap:3px;}
  .avatar{
    width:44px; height:44px; border-radius:50%;
    background:linear-gradient(180deg, var(--avatar-a), var(--avatar-b));
    color:#fff; font-weight:600; font-size:17px;
    display:flex; align-items:center; justify-content:center; letter-spacing:.02em;
  }
  .who .name{font-size:11.5px; color:var(--head-text); font-weight:500;}

  /* ---- thread ---- */
  .thread{
    flex:1 1 auto; overflow-y:auto; padding:14px 14px 10px;
    display:flex; flex-direction:column; gap:3px;
    overscroll-behavior:contain;
  }
  .daysep{
    align-self:center; color:var(--meta); font-size:11.5px; font-weight:500;
    margin:6px 0 10px;
  }
  .daysep b{font-weight:700;}
  .bubble{
    max-width:78%; padding:8px 13px 9px; border-radius:18px;
    font-size:16px; line-height:1.32; letter-spacing:-.01em;
    animation:pop .22s ease-out;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .in{align-self:flex-start; background:var(--in-bubble); color:var(--in-text); border-bottom-left-radius:6px;}
  .out{align-self:flex-end; background:var(--out-bubble); color:var(--out-text); border-bottom-right-radius:6px;}
  .in + .in{margin-top:1px;}
  .out + .in, .in + .out{margin-top:10px;}
  .receipt{
    align-self:flex-end; color:var(--meta); font-size:11px; font-weight:500;
    margin:2px 4px 0;
  }
  .typing{display:flex; gap:4px; align-items:center; padding:12px 14px;}
  .typing i{
    width:8px; height:8px; border-radius:50%; background:var(--meta); opacity:.5;
    animation:blink 1.2s infinite;
  }
  .typing i:nth-child(2){animation-delay:.18s}
  .typing i:nth-child(3){animation-delay:.36s}

  .endnote{
    align-self:center; text-align:center; color:var(--meta); font-size:12px;
    margin:16px 0 6px; line-height:1.6;
  }
  .replay{
    display:inline-block; margin-top:6px; padding:7px 18px;
    border:1.5px solid var(--brand); color:var(--brand); border-radius:999px;
    font-size:13px; font-weight:700; letter-spacing:.06em; background:none;
    font-family:inherit; cursor:pointer;
  }
  .replay:focus-visible{outline:2px solid var(--brand); outline-offset:2px;}

  /* ---- choice tray (replaces the keyboard) ---- */
  .tray{
    flex:0 0 auto; padding:10px 14px 8px;
    border-top:.5px solid var(--head-border);
    background:var(--head-bg);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    display:flex; flex-direction:column; gap:8px;
    min-height:64px;
  }
  .tray .hint{
    color:var(--meta); font-size:10.5px; font-weight:600; letter-spacing:.12em;
    text-transform:uppercase; text-align:center;
  }
  .tray .idle{color:var(--meta); font-size:12.5px; text-align:center; padding:10px 0;}
  .choice{
    width:100%; text-align:left;
    border:1.5px solid var(--choice-border); background:var(--choice-bg);
    color:var(--choice-text);
    border-radius:20px; padding:10px 15px;
    font-size:15px; line-height:1.3; font-family:inherit;
    cursor:pointer; animation:rise .25s ease-out;
  }
  .choice:active{transform:scale(.98);}
  .choice:focus-visible{outline:2px solid var(--choice-text); outline-offset:2px;}
  .homebar{
    flex:0 0 auto; height:20px; display:flex; align-items:center; justify-content:center;
    background:var(--head-bg);
  }
  .homebar i{width:134px; height:5px; border-radius:3px; background:var(--head-text); opacity:.28;}

  @keyframes pop{from{transform:translateY(8px) scale(.97); opacity:0} to{transform:none; opacity:1}}
  @keyframes rise{from{transform:translateY(10px); opacity:0} to{transform:none; opacity:1}}
  @keyframes blink{0%,60%,100%{opacity:.35} 30%{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    .bubble,.choice{animation:none;}
    .typing i{animation:none; opacity:.6;}
  }
</style>

<p class="caption"><span class="brand">DRAMA</span><br>Maquette de l'écran unique — touche une réponse pour jouer la scène.</p>

<div class="phone" role="application" aria-label="Maquette du jeu Drama : conversation avec Tristan Heng">
  <div class="statusbar">
    <span>09:41</span>
    <span class="glyphs">
      <span class="sig"><i></i><i></i><i></i><i></i></span>
      <span class="batt"><i></i></span>
    </span>
  </div>
  <header class="head">
    <span class="chev">‹</span>
    <div class="who">
      <div class="avatar">TH</div>
      <span class="name">Tristan Heng</span>
    </div>
    <span></span>
  </header>
  <main class="thread" id="thread" aria-live="polite"></main>
  <div class="tray" id="tray"><div class="idle">…</div></div>
  <div class="homebar"><i></i></div>
</div>

<script>
(function(){
  const thread = document.getElementById('thread');
  const tray = document.getElementById('tray');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let clockMin = 41;

  const sleep = ms => new Promise(r => setTimeout(r, reduced ? Math.min(ms, 250) : ms));
  const scroll = () => { thread.scrollTop = thread.scrollHeight; };
  const stamp = () => { clockMin += 1 + Math.floor(Math.random()*2); return '09:' + clockMin; };

  function el(tag, cls, text){
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined) n.textContent = text;
    return n;
  }

  function daySep(){
    const d = el('div','daysep');
    d.innerHTML = '<b>iMessage</b><br>Aujourd’hui 09:41';
    thread.appendChild(d); scroll();
  }

  async function incoming(text, typingMs){
    const t = el('div','bubble in typing');
    t.append(el('i'), el('i'), el('i'));
    thread.appendChild(t); scroll();
    await sleep(typingMs || 1600);
    t.classList.remove('typing');
    t.replaceChildren(document.createTextNode(text));
    scroll();
  }

  function outgoing(text){
    const b = el('div','bubble out', text);
    thread.appendChild(b);
    const r = el('div','receipt','Distribué');
    thread.appendChild(r); scroll();
    return r;
  }

  function choose(options){
    return new Promise(resolve => {
      tray.replaceChildren(el('div','hint','À toi de répondre'));
      options.forEach(opt => {
        const btn = el('button','choice', opt.label);
        btn.addEventListener('click', () => {
          tray.replaceChildren(el('div','idle','…'));
          const receipt = outgoing(opt.label);
          resolve({ ...opt, receipt });
        });
        tray.appendChild(btn);
      });
      scroll();
    });
  }

  function endCard(){
    const n = el('div','endnote');
    n.append('Fin de la maquette.', el('br'), 'Chaque choix compte — les personnages s’en souviendront.', el('br'));
    const b = el('button','replay','↺  REJOUER');
    b.addEventListener('click', play);
    n.appendChild(b);
    thread.appendChild(n);
    tray.replaceChildren(el('div','idle','Drama — messagerie uniquement.'));
    scroll();
  }

  async function play(){
    thread.replaceChildren();
    tray.replaceChildren(el('div','idle','…'));
    clockMin = 41;
    daySep();
    await sleep(700);
    await incoming('Mademoiselle Marchand. Tristan Heng.', 1500);
    await incoming('Vous êtes partie hier sans constat, sans nom, sans rien. Mon chauffeur a retrouvé votre plateforme de livraison. Ne lui en veuillez pas — c’est son métier.', 2300);
    await incoming('Votre vélo est mort. Votre poignet, j’espère que non. Dites-moi où vous faire livrer un vélo neuf.', 2100);

    const c1 = await choose([
      { label:'Je n’ai besoin de rien. Surtout pas de vous.',
        reply:'Bien. La fierté, elle, ne se répare pas.' },
      { label:'Un vélo de course. Le mien valait trois mois de salaire.',
        reply:'Il sera en bas de chez vous demain, 8h.' },
      { label:'Vous renversez toujours les gens avant de leur faire des cadeaux ?',
        reply:'Seulement ceux qui recollent ma carte au scotch.' },
    ]);
    await sleep(900);
    c1.receipt.textContent = 'Lu ' + stamp();
    await incoming(c1.reply, 1700);
    await sleep(500);
    await incoming('J’ai autre chose à vous proposer. Rien d’illégal. Tout d’inhabituel.', 2000);
    await incoming('Jeudi, 11h. Tour Heng, 47e étage. Un badge sera à votre nom.', 1800);

    const c2 = await choose([
      { label:'J’y serai.', reply:'Bien. Pas de retard.' },
      { label:'Dites toujours. Je décide ensuite.', reply:'Pas par écrit. Jeudi, 11h.' },
      { label:'Non merci.', reply:'Le badge restera valable jusqu’à jeudi. Réfléchissez.' },
    ]);
    await sleep(900);
    c2.receipt.textContent = 'Lu ' + stamp();
    await incoming(c2.reply, 1500);
    await sleep(400);
    endCard();
  }

  play();
})();
</script>
