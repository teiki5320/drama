name: contre_jour
description: "À Contre-Jour (逆光) — Drama romantique mobile, 112 jours, 5 fins."
publish_to: "none"
version: 0.8.1+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/scenario.json
    - assets/data/shop_catalog.json
    - assets/data/investments.json
    - assets/data/insta_seed.json
    - assets/photos/characters/
    - assets/photos/posts/
    - assets/photos/scenes/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true
  android: "launcher_icon"
  min_sdk_android: 23
  adaptive_icon_background: "#FBF7EF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
