name: drama
description: "Drama — jeu narratif qui se joue entièrement dans une messagerie."
publish_to: "none"
version: 0.18.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/photos/avatars/
    - assets/photos/ep1/
    - assets/videos/video_livreuse_velo_rue_pavee_brouillard.mp4

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true
  android: "launcher_icon"
  min_sdk_android: 23
  adaptive_icon_background: "#FBF7EF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
