name: contre_jour
description: "À Contre-Jour (逆光) — Drama romantique mobile, 112 jours, 5 fins."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/scenario.json
    - assets/data/shop_catalog.json
    - assets/data/investments.json
    - assets/data/insta_seed.json
